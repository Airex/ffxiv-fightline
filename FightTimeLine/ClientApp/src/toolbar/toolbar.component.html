<div class="toolbar noselect">
  <span style="margin-right: 10px" *ngIf="showHome">
    <button nz-button (click)="onHome()" nz-tooltip nzTooltipTitle="Home">
      <i nz-icon nzType="home"></i>
    </button>
  </span>
  <span *ngIf="showTitle" class="toolbar-title">Fight Time Line</span>
  <span *ngIf="showJobButton">
    <img *ngIf="!!fraction" [src]="fraction.icon" nz-tooltip [nzTooltipTitle]="fraction.name" style="height: 31px; margin-right: 3px; width: 31px;"/>
    <span *ngIf="gameService.name == 'ffxiv'">
      <button nz-dropdown nzTrigger="click" [nzDropdownMenu]="jobMenu" nz-button nzType="primary">Add Job</button>
      <nz-dropdown-menu #jobMenu="nzDropdownMenu">
        <ul nz-menu class="noselect">
          <li nz-menu-item *ngFor="let c of menu" (click)="onAddJob(c.name)">
            <img [src]="c.icon" style="height: 30px; margin-right: 6px; width: 30px;"/>
            <span style="font-weight: bold">{{c.name}}</span>
          </li>
        </ul>
      </nz-dropdown-menu>
    </span>
    <span *ngIf="gameService.name == 'swtor'">
      <button nz-dropdown [nzDropdownMenu]="swtorMenu" nz-button nzType="primary" nzTrigger="click">Add Class</button>
      <nz-dropdown-menu #swtorMenu="nzDropdownMenu">
        <ul nz-menu>
          <li nz-submenu *ngFor="let cl of menu | keyvalue">
            <span title style="font-size: large">{{cl.key}}</span>
            <ul>
              <li nz-menu-item *ngFor="let c of cl.value" (click)="onAddJob(c.name)">
                <img [src]="c.icon" style="height: 52px; margin-right: 6px; width: 52px;"/>
                <span style="font-weight: bold">
                  {{c.name}}
                </span>
              </li>
            </ul>
          </li>

        </ul>
      </nz-dropdown-menu>
    </span>
  </span>
  <span *ngIf="showMenu">
    <button nz-dropdown [nzDropdownMenu]="mainMenu" nzTrigger="click" nz-button nz-tooltip nzTooltipTitle="Menu">
      <i nz-icon nzType="menu"></i>
    </button>
    <nz-dropdown-menu #mainMenu="nzDropdownMenu">
      <ul nz-menu class="noselect">
        <li nz-menu-item (click)="onNew()">New</li>
        <li nz-menu-item (click)="onLoad()">Load</li>
        <li nz-menu-item (click)="onSave()">Save</li>
        <li nz-menu-item (click)="onOpenBossTemplates()">Boss templates</li>
        <li nz-menu-item (click)="onShowAsTable()">Table view</li>
        <li nz-menu-item (click)="onImport()" *ngIf="gameService.showImport">Import from FFLogs</li>
        <li nz-menu-item (click)="onExportToTable()">Export to Google Sheets (BETA)</li>
      </ul>
    </nz-dropdown-menu>
  </span>
  <span style="margin-left: 10px" *ngIf="showUndoRedo">
    <nz-button-group>
      <button nz-button (click)="onUndo()" [disabled]="!canUndo" nzPlacement="bottom"><i nz-icon nzType="undo"></i>Undo</button>
      <button nz-button (click)="onRedo()" [disabled]="!canRedo" nzPlacement="bottom"><i nz-icon nzType="redo"></i>Redo</button>
    </nz-button-group>
  </span>
  <span style="margin-left: 10px" *ngIf="showfilter">
    <abilityFilter #filter [holders]="holders" (changed)="updateFilter($event)"></abilityFilter>
  </span>
  <span style="margin-left: 10px" *ngIf="showView">
    <viewMenu #view (changed)="updateView($event)"></viewMenu>
  </span>
  <span style="margin-left: 10px" *ngIf="!toolToUse && showTools">
    <button nz-dropdown [nzDropdownMenu]="toolMenu" [nzTrigger]="'click'" nz-button><i nz-icon nzType="tool" theme="fill"></i>Tools</button>
    <nz-dropdown-menu #toolMenu="nzDropdownMenu">
      <ul nz-menu class="noselect">
        <li nz-menu-item (click)="useTool(t)" *ngFor="let t of availableTools">{{t}}</li>
      </ul>
    </nz-dropdown-menu>
  </span>
  <span style="margin-left: 10px" *ngIf="!!toolToUse && showTools">
    <button nz-button nzType="danger" (click)="useTool(null)">{{toolToUse}}</button>
  </span>
  <span style="display: flex; margin-left: 10px;" *ngIf="showTeamwork">
    <avatarWithPing *ngFor="let user of connectedUsers" [owner]="false" textSizeRatio="3" [name]="user.name" [id]="user.id" [ngStyle]="{'margin-right':'2px'}"></avatarWithPing>
  </span>

  <span class="example-spacer"></span>

  <span>

    <button nz-dropdown nz-button [nzDropdownMenu]="accountMenu" nz-tooltip [nzTrigger]="'click'" nzShape="circle" nzTooltipTitle="Account" [nzType]="authenticated?'primary':'danger'">
      <i nz-icon nzType="user" aria-label="Account"></i>
    </button>
    <nz-dropdown-menu #accountMenu="nzDropdownMenu">
      <ul nz-menu class="noselect">
        <li nz-menu-item (click)="login()" *ngIf="!authenticated">
          Sign in
        </li>
        <li nz-menu-item (click)="register()" *ngIf="!authenticated">
          Sign up
        </li>
        <li nz-menu-item *ngIf="authenticated">
          Logged as {{username}}
        </li>
        <li nz-menu-item (click)="logout()" *ngIf="authenticated">
          Sign out
        </li>
      </ul>
    </nz-dropdown-menu>
  </span>
  <span>
    <button nz-button nzShape="circle" nzType="primary" nz-tooltip nzTooltipTitle="Refresh" (click)="onRefresh()" style="margin-left: 10px" *ngIf="showRefresh">
      <i nz-icon nzType="sync"></i>
    </button>
  </span>
  <span>
    <button nz-button nzShape="circle" nzType="primary" nz-tooltip nzTooltipTitle="Settings" (click)="openSettings()" style="margin-left: 10px">
      <i nz-icon nzType="setting" aria-label="Settings"></i>
    </button>
  </span>
  <span>
    <button nz-button nzType="primary" nzShape="circle" nz-tooltip nzTooltipTitle="Contact me in Discord" (click)="gotoDiscord()" style="margin-left: 10px">
      <svg style="height: 1em; margin-top: 3px; width: 1em;" viewBox="0 0 24 24">
        <path fill="#ffffff" d="M22,24L16.75,19L17.38,21H4.5A2.5,2.5 0 0,1 2,18.5V3.5A2.5,2.5 0 0,1 4.5,1H19.5A2.5,2.5 0 0,1 22,3.5V24M12,6.8C9.32,6.8 7.44,7.95 7.44,7.95C8.47,7.03 10.27,6.5 10.27,6.5L10.1,6.33C8.41,6.36 6.88,7.53 6.88,7.53C5.16,11.12 5.27,14.22 5.27,14.22C6.67,16.03 8.75,15.9 8.75,15.9L9.46,15C8.21,14.73 7.42,13.62 7.42,13.62C7.42,13.62 9.3,14.9 12,14.9C14.7,14.9 16.58,13.62 16.58,13.62C16.58,13.62 15.79,14.73 14.54,15L15.25,15.9C15.25,15.9 17.33,16.03 18.73,14.22C18.73,14.22 18.84,11.12 17.12,7.53C17.12,7.53 15.59,6.36 13.9,6.33L13.73,6.5C13.73,6.5 15.53,7.03 16.56,7.95C16.56,7.95 14.68,6.8 12,6.8M9.93,10.59C10.58,10.59 11.11,11.16 11.1,11.86C11.1,12.55 10.58,13.13 9.93,13.13C9.29,13.13 8.77,12.55 8.77,11.86C8.77,11.16 9.28,10.59 9.93,10.59M14.1,10.59C14.75,10.59 15.27,11.16 15.27,11.86C15.27,12.55 14.75,13.13 14.1,13.13C13.46,13.13 12.94,12.55 12.94,11.86C12.94,11.16 13.45,10.59 14.1,10.59Z"/>
      </svg>
    </button>
  </span>
  <span>
    <button nz-button nzType="primary" nzShape="circle" nz-tooltip nzTooltipTitle="Leave feedback here" (click)="gotoGithub()" style="margin-left: 10px">
      <i nz-icon nzType="github" theme="outline"></i>
    </button>
  </span>
  <span>

    <button nz-dropdown nz-button [nzDropdownMenu]="helpMenu" [nzTrigger]="'click'" nzType="dashed" nzShape="circle" style="margin-left: 10px">
      <i nz-icon nzType="question" aria-label="Help"></i>
    </button>
    <nz-dropdown-menu #helpMenu="nzDropdownMenu">
      <ul nz-menu class="noselect">
        <li nz-menu-item (click)="showWhatsNewInt()">What's new</li>
        <li nz-menu-item (click)="showHelp()">Help</li>
      </ul>
    </nz-dropdown-menu>

  </span>
</div>
