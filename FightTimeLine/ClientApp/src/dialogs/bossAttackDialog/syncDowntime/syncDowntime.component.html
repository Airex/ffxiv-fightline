<nz-layout [ngStyle]="{width:'100%', height:'100%'}">  
    <nz-content style="padding: 4px;">
      <form nz-form>
        <nz-form-item>
          <nz-form-label [nzSpan]="6" nzFor="downtime">Downtime</nz-form-label>
          <nz-form-control [nzSpan]="14">
            <nz-select name="downtime" #typeControl style="width: 90%;" [(ngModel)]="selected" nzPlaceHolder="Select downtime to connect">
              <nz-option nzValue="" nzLabel="None"></nz-option>
              <nz-option *ngFor="let it of downtimes" [nzValue]="it.id" [nzLabel]="it.dispayName"></nz-option>
            </nz-select>
          </nz-form-control>
        </nz-form-item>               
      </form>
    </nz-content>  
</nz-layout>
