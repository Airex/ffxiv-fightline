<form nz-form>
  <nz-form-item>
    <nz-form-control nzSpan="12">
      <nz-select nzPlaceHolder="Template" name="exportTemplatesList" [formControl]="exportTemplatesControl" nzSize="small">
        <nz-option *ngFor="let template of templates" [nzValue]="template.name" [nzLabel]="template.name"></nz-option>
      </nz-select>
    </nz-form-control>
    <nz-form-control nzSpan="12">
      <button nz-button [disabled]="!this.exportTemplatesControl.value" (click)="show()" nzSize="small">Show</button>
    </nz-form-control>
  </nz-form-item>
</form>

<div mat-dialog-content style="height: 650px">
  <nz-table #table [nzData]="set.rows" [nzLoading]="loading" [nzBordered]="true" [nzScroll]="{ y: '600px' }" [nzShowPagination]="false" [nzFrontPagination]="false" nzSize="small">
    <thead>
    <tr>
      <th *ngFor="let column of set.columns" style="text-align: center" [nzWidth]="getWidth(column.text, !!column.icon)">
        <img *ngIf="column.icon" class="abilityIcon" style="margin-right: 2px;" [src]="column.icon" />
        <span>{{getTitle(column.text)}}</span>
      </th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let row of table.data">
      <td *ngFor="let cell of row.cells" [ngStyle]="{'background-color': cell.colorFn && cell.colorFn(row.filterData) || ''}">
        <ng-container [ngSwitch]="cell.type">
          <div *ngSwitchCase="'text'">
            <nz-tag [nzColor]="cell.color">
              <div style="margin: 0 2px 0 2px">{{cell.text}}</div>
            </nz-tag>
          </div>
          <div *ngSwitchCase="'items'">
            <nz-space *ngFor="let d of cell.items">
              <nz-space-item>
                <nz-tag>
                  <div style="margin: 0 2px 0 2px">
                    <img class="abilityIcon" *ngIf="d.icon" [src]="d.icon" />
                    {{d.text}}
                  </div>
                </nz-tag>
              </nz-space-item>
            </nz-space>
          </div>
        </ng-container>
      </td>
    </tr>
    </tbody>
  </nz-table>
</div>

<div *nzModalFooter>
  <button nz-button (click)="onClose()" nzType="primary" cdkFocusInitial>Close</button>
</div>
