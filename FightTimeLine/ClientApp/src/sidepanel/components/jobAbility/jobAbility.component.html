<nz-space nzDirection="vertical">
  <nz-space-item>
    <img [src]="ability.icon" class="icon" />
    <span class="abilityName">{{ability.name}}</span>
    <div class="abilityDescriptionContainer">
      <span class="abilityDescription" [innerHtml]="description"></span>
    </div>
  </nz-space-item>
  <nz-space-item>
    <label nz-checkbox [(ngModel)]="compactView" (ngModelChange)="compact(compactView)">Compact view</label>
  </nz-space-item>
  <nz-space-item>
    <button nz-button (click)="fill(it)">Fill</button>
  </nz-space-item>
  <nz-space-item>
    <button nz-button nzType="primary" (click)="hide(it)">Hide</button>
  </nz-space-item>
  <nz-space-item>
    <button nz-button nzType="danger" (click)="clear(it)">Clear</button>
  </nz-space-item>
</nz-space>
