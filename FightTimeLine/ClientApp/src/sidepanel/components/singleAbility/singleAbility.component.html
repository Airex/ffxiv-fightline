<nz-space nzDirection="vertical">
  <nz-space-item>
    <img [src]="ability.icon" class="icon" />
    <span class="abilityName">{{ability.name}}</span>
  </nz-space-item>
  <nz-space-item>
    <div class="abilityDescriptionContainer">
      <span class="abilityDescription" [innerHtml]="description"></span>
    </div>
  </nz-space-item>
  <nz-space-item>
    <sidepanel-area header="Used on" *ngIf="!!ptyMemUsages">
      <div *ngFor="let it of ptyMemUsages">
        <i nz-icon nzType="clock-circle" theme="outline"></i><a class="similarLink" (click)="similarClick(it)"><span class="usedTime">{{it.offset}}</span></a><img class="abilityIcon" [src]="it.icon" /> <span class="usedTarget">{{it.target}}</span>
      </div>
    </sidepanel-area>
  </nz-space-item>
  <nz-space-item *ngIf=" it.ability.ability.settings && it.ability.ability.settings.length > 0">
    <button nz-button nzType="primary" (click)="settings(it)">Settings</button>
  </nz-space-item>
</nz-space>
