name: Archive

on: [push]

jobs:
  build:    
    runs-on: ubuntu-latest    
    strategy:
      matrix:
        node-version: [10.x]

    steps:      
      - uses: actions/checkout@v1
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v1
        with:
          node-version: ${{ matrix.node-version }}
      - name: Generate build number
        id: buildnumber
        uses: einaregilsson/build-number@v2 
        with:
          token: ${{secrets.github_token}}        
      - uses: bluwy/substitute-string-action@v1
        id: sub
        with:
          _input-file: './FightTimeLine/ClientApp/src/environments/environment.prod.ts'
          _format-key: '%%version%%'
          version: ${{ steps.buildnumber.outputs.build_number }}  
      - name: npm install
        working-directory: ./FightTimeLine/ClientApp
        run: |        
          npm install      
          npm run ng-high-memory -- --prod
        env:
          CI: true
      - name: remove assets
        working-directory: ./FightTimeLine/ClientApp/dist
        run: |
          rm -r assets
      - name: send to ftp
        if: github.ref == 'refs/heads/master'                
        uses: SamKirkland/FTP-Deploy-Action@master
        with:
          ftp-server: ftp://ftp-eu.site4now.net/${{ secrets.FTP_FOLDER }}/ClientApp/dist
          ftp-username: ${{ secrets.FTP_USER }}
          ftp-password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./FightTimeLine/ClientApp/dist
          git-ftp-args: --all          
